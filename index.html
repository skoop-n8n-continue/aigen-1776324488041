<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Skoop Mobile Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=y2r8k4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Status Bar -->
        <header class="status-bar">
            <div class="time" id="current-time">12:00</div>
            <div class="status-icons">
                <span class="battery">100%</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <section class="hero">
                <h1 class="greeting">Good Morning</h1>
                <p class="date" id="current-date">Thursday, April 16</p>
            </section>

            <section class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Visitors</span>
                    <span class="stat-value">1,284</span>
                    <span class="stat-trend positive">+12%</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Sales</span>
                    <span class="stat-value">$4,520</span>
                    <span class="stat-trend positive">+8%</span>
                </div>
            </section>

            <section class="featured">
                <h3>Latest Updates</h3>
                <div class="scroll-container" id="updates-list">
                    <!-- Dynamic content will be injected here -->
                    <div class="update-card">
                        <div class="update-img" style="background-image: url('assets/update1.jpg?v=x9b3v2')"></div>
                        <div class="update-info">
                            <h4>New Feature Launch</h4>
                            <p>Check out our latest AI tools.</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <span class="icon">🏠</span>
                <span class="label">Home</span>
            </div>
            <div class="nav-item">
                <span class="icon">📊</span>
                <span class="label">Stats</span>
            </div>
            <div class="nav-item">
                <span class="icon">👤</span>
                <span class="label">Profile</span>
            </div>
        </nav>
    </div>
    <script src="script.js?v=y2r8k4"></script>
</body>
</html>
