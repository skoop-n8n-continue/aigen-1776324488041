<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Skoop Live Dashboard</title>
    <!-- Versioning all assets with ?v=r4t7y1 -->
    <link rel="stylesheet" href="styles.css?v=r4t7y1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Status Bar -->
        <header class="status-bar">
            <div class="time" id="current-time">00:00</div>
            <div class="status-icons">
                <span id="network-status" class="status-badge">Online</span>
                <span class="battery">98%</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <section class="hero">
                <div class="hero-top">
                    <h1 class="greeting" id="greeting-text">Hello!</h1>
                    <div class="weather-widget" id="weather-widget">
                        <div class="temp">--°C</div>
                        <div class="condition">Loading...</div>
                    </div>
                </div>
                <p class="date" id="current-date">Loading date...</p>
            </section>

            <!-- Live Market Stats -->
            <section class="section-container">
                <h3 class="section-title">Live Markets</h3>
                <div class="stats-grid">
                    <div class="stat-card" id="btc-card">
                        <span class="stat-label">Bitcoin (BTC)</span>
                        <span class="stat-value">$0.00</span>
                        <span class="stat-trend" id="btc-trend">0.00%</span>
                    </div>
                    <div class="stat-card" id="eth-card">
                        <span class="stat-label">Ethereum (ETH)</span>
                        <span class="stat-value">$0.00</span>
                        <span class="stat-trend" id="eth-trend">0.00%</span>
                    </div>
                </div>
            </section>

            <!-- Live News Section -->
            <section class="section-container featured">
                <h3 class="section-title">Latest Headlines</h3>
                <div class="scroll-container" id="news-list">
                    <!-- Dynamic news will be injected here -->
                    <div class="loading-news">Fetching the latest stories...</div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation (Non-interactive display) -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <span class="icon">🏠</span>
                <span class="label">Live</span>
            </div>
            <div class="nav-item">
                <span class="icon">📈</span>
                <span class="label">Market</span>
            </div>
            <div class="nav-item">
                <span class="icon">📰</span>
                <span class="label">News</span>
            </div>
        </nav>
    </div>

    <!-- Versioning script with ?v=r4t7y1 -->
    <script src="script.js?v=r4t7y1"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
